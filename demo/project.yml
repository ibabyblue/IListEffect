name: IListEffectDemo
options:
  bundleIdPrefix: com.demo
  deploymentTarget:
    iOS: "17.0"
packages:
  IListEffect:
    path: ..
targets:
  IListEffectDemo:
    type: application
    platform: iOS
    sources: [IListEffectDemo]
    dependencies:
      - package: IListEffect
        product: ListEffect-UIKit
      - package: IListEffect
        product: ListEffect-SwiftUI
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
